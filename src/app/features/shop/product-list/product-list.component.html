<div class="max-w-7xl mx-auto px-6 py-10">
  <h1 class="text-3xl font-bold text-gray-800 mb-8">Produtos</h1>

  @if (products.length === 0) {
    <p class="text-gray-500">Nenhum produto encontrado.</p>
  }

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    @for (product of products; track product.id) {
      <div class="bg-white rounded-xl shadow hover:shadow-md transition overflow-hidden">
        @if (product.imageUrl) {
          <img [src]="product.imageUrl" alt="{{ product.name }}"
            class="h-48 w-full object-cover" />
        } @else {
          <div class="bg-gray-100 h-48 flex items-center justify-center text-5xl">🛍️</div>
        }
        <div class="p-4">
          <h3 class="font-semibold text-gray-800 text-lg">{{ product.name }}</h3>
          <p class="text-gray-500 text-sm mt-1 line-clamp-2">{{ product.description }}</p>
          <div class="flex items-center justify-between mt-4">
            <span class="text-blue-600 font-bold text-lg">{{ product.price | currency:'BRL' }}</span>
            <span class="text-xs text-gray-400">Estoque: {{ product.stock }}</span>
          </div>
          <div class="flex gap-2 mt-3">
            <a [routerLink]="['/shop', product.id]"
              class="flex-1 text-center border border-blue-600 text-blue-600 py-1.5 rounded-lg text-sm hover:bg-blue-50 transition">
              Ver
            </a>
            <button (click)="addToCart(product)"
              class="flex-1 bg-blue-600 text-white py-1.5 rounded-lg text-sm hover:bg-blue-700 transition">
              + Carrinho
            </button>
          </div>
        </div>
      </div>
    }
  </div>
</div>
