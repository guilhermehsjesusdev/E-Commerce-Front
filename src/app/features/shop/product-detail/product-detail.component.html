<div class="max-w-4xl mx-auto px-6 py-10">
  @if (product) {
    <div class="bg-white rounded-xl shadow p-8 flex flex-col md:flex-row gap-8">
      <div class="bg-gray-100 rounded-xl h-64 w-full md:w-72 flex items-center justify-center text-7xl flex-shrink-0">
        🛍️
      </div>
      <div class="flex-1">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">{{ product.name }}</h1>
        <p class="text-gray-500 mb-6">{{ product.description }}</p>
        <p class="text-3xl font-bold text-blue-600 mb-2">{{ product.price | currency:'BRL' }}</p>
        <p class="text-sm text-gray-400 mb-6">Estoque disponível: {{ product.stock }}</p>
        <div class="flex gap-3">
          <button (click)="addToCart()"
            class="bg-blue-600 text-white px-8 py-3 rounded-lg hover:bg-blue-700 transition font-medium">
            Adicionar ao Carrinho
          </button>
          <a routerLink="/shop"
            class="border border-gray-300 text-gray-600 px-6 py-3 rounded-lg hover:bg-gray-50 transition">
            Voltar
          </a>
        </div>
      </div>
    </div>
  } @else {
    <p class="text-gray-500">Carregando produto...</p>
  }
</div>
