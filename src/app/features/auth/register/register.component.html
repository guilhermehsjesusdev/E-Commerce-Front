<div class="min-h-screen flex items-center justify-center bg-gray-50">
  <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Criar conta</h2>

    @if (error) {
      <div class="bg-red-100 text-red-700 px-4 py-3 rounded mb-4">{{ error }}</div>
    }
    @if (success) {
      <div class="bg-green-100 text-green-700 px-4 py-3 rounded mb-4">{{ success }}</div>
    }

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input [(ngModel)]="email" type="email" placeholder="seu@email.com"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <div class="mb-6">
      <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
      <input [(ngModel)]="password" type="password" placeholder="••••••••"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <button (click)="register()"
      class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-medium">
      Cadastrar
    </button>

    <p class="text-center text-sm text-gray-500 mt-4">
      Já tem conta? <a routerLink="/login" class="text-blue-600 hover:underline">Entrar</a>
    </p>
  </div>
</div>
