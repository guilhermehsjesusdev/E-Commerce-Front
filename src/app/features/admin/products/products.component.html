<div class="max-w-6xl mx-auto px-6 py-10">
  <div class="flex items-center justify-between mb-8">
    <h1 class="text-3xl font-bold text-gray-800">Produtos</h1>
    <button (click)="showForm = !showForm"
      class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 transition">
      + Novo Produto
    </button>
  </div>

  @if (showForm) {
    <div class="bg-white rounded-xl shadow p-6 mb-8">
      @if (error) {
        <div class="bg-red-100 text-red-700 px-4 py-3 rounded mb-4">{{ error }}</div>
      }
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input [(ngModel)]="name" placeholder="Nome" class="border rounded-lg px-4 py-2 w-full" />
        <input [(ngModel)]="description" placeholder="Descrição" class="border rounded-lg px-4 py-2 w-full" />
        <input [(ngModel)]="price" type="number" placeholder="Preço" class="border rounded-lg px-4 py-2 w-full" />
        <input [(ngModel)]="stock" type="number" placeholder="Estoque" class="border rounded-lg px-4 py-2 w-full" />
        <select [(ngModel)]="categoryId" class="border rounded-lg px-4 py-2 w-full">
          <option value="">Selecione a categoria</option>
          @for (cat of categories; track cat.id) {
            <option [value]="cat.id">{{ cat.name }}</option>
          }
        </select>
      </div>
      <div class="flex gap-3 mt-4">
        <button (click)="save()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
          Salvar
        </button>
        <button (click)="showForm = false; reset()" class="border border-gray-300 px-6 py-2 rounded-lg hover:bg-gray-50 transition">
          Cancelar
        </button>
      </div>
    </div>
  }

  <div class="bg-white rounded-xl shadow overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
        <tr>
          <th class="px-6 py-3 text-left">Nome</th>
          <th class="px-6 py-3 text-left">Preço</th>
          <th class="px-6 py-3 text-left">Estoque</th>
          <th class="px-6 py-3 text-left">Ações</th>
        </tr>
      </thead>
      <tbody>
        @for (product of products; track product.id) {
          <tr class="border-t hover:bg-gray-50">
            <td class="px-6 py-4 font-medium text-gray-800">{{ product.name }}</td>
            <td class="px-6 py-4 text-blue-600">{{ product.price | currency:'BRL' }}</td>
            <td class="px-6 py-4 text-gray-500">{{ product.stock }}</td>
            <td class="px-6 py-4">
              <button (click)="delete(product.id)" class="text-red-500 hover:text-red-700 transition text-sm">
                Excluir
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
