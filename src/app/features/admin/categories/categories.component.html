<div class="max-w-2xl mx-auto px-6 py-10">
  <h1 class="text-3xl font-bold text-gray-800 mb-8">Categorias</h1>

  @if (error) {
    <div class="bg-red-100 text-red-700 px-4 py-3 rounded mb-4">{{ error }}</div>
  }
  @if (success) {
    <div class="bg-green-100 text-green-700 px-4 py-3 rounded mb-4">{{ success }}</div>
  }

  <div class="bg-white rounded-xl shadow p-6 mb-8">
    <h2 class="text-lg font-semibold text-gray-700 mb-4">Nova Categoria</h2>
    <div class="flex gap-3">
      <input [(ngModel)]="name" placeholder="Nome da categoria"
        class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      <button (click)="save()"
        class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
        Adicionar
      </button>
    </div>
  </div>

  <div class="bg-white rounded-xl shadow overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
        <tr>
          <th class="px-6 py-3 text-left">Nome</th>
          <th class="px-6 py-3 text-left">ID</th>
        </tr>
      </thead>
      <tbody>
        @for (cat of categories; track cat.id) {
          <tr class="border-t hover:bg-gray-50">
            <td class="px-6 py-4 font-medium text-gray-800">{{ cat.name }}</td>
            <td class="px-6 py-4 text-gray-400 font-mono text-xs">{{ cat.id }}</td>
          </tr>
        } @empty {
          <tr>
            <td colspan="2" class="px-6 py-8 text-center text-gray-500">Nenhuma categoria cadastrada.</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
