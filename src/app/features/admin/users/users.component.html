<div class="max-w-5xl mx-auto px-6 py-10">
  <h1 class="text-3xl font-bold text-gray-800 mb-8">Usuários</h1>

  <div class="bg-white rounded-xl shadow overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
        <tr>
          <th class="px-6 py-3 text-left">Email</th>
          <th class="px-6 py-3 text-left">Role</th>
          <th class="px-6 py-3 text-left">Ações</th>
        </tr>
      </thead>
      <tbody>
        @for (user of users; track user.id) {
          <tr class="border-t hover:bg-gray-50">
            <td class="px-6 py-4 text-gray-800">{{ user.email }}</td>
            <td class="px-6 py-4">
              <span class="px-3 py-1 rounded-full text-xs font-medium"
                [class]="user.role === 'Admin' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'">
                {{ user.role }}
              </span>
            </td>
            <td class="px-6 py-4 flex gap-2">
              @if (user.role !== 'Admin') {
                <button (click)="promote(user.id)"
                  class="bg-purple-600 text-white px-3 py-1 rounded-lg text-xs hover:bg-purple-700 transition">
                  Promover a Admin
                </button>
              } @else {
                <button (click)="demote(user.id)"
                  class="bg-gray-500 text-white px-3 py-1 rounded-lg text-xs hover:bg-gray-600 transition">
                  Rebaixar para Customer
                </button>
              }
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="3" class="px-6 py-8 text-center text-gray-500">Nenhum usuário encontrado.</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
