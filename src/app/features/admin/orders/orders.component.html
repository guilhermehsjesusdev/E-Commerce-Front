<div class="max-w-6xl mx-auto px-6 py-10">
  <h1 class="text-3xl font-bold text-gray-800 mb-8">Pedidos</h1>

  <div class="bg-white rounded-xl shadow overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
        <tr>
          <th class="px-6 py-3 text-left">ID</th>
          <th class="px-6 py-3 text-left">Data</th>
          <th class="px-6 py-3 text-left">Total</th>
          <th class="px-6 py-3 text-left">Status</th>
          <th class="px-6 py-3 text-left">Ações</th>
        </tr>
      </thead>
      <tbody>
        @for (order of orders; track order.id) {
          <tr class="border-t hover:bg-gray-50">
            <td class="px-6 py-4 text-gray-500 font-mono text-xs">{{ order.id.slice(0, 8) }}...</td>
            <td class="px-6 py-4 text-gray-600">{{ order.createdAt | date:'dd/MM/yyyy' }}</td>
            <td class="px-6 py-4 font-bold text-blue-600">{{ order.total | currency:'BRL' }}</td>
            <td class="px-6 py-4">
              <span class="px-3 py-1 rounded-full text-xs font-medium {{ statusColors[order.status] }}">
                {{ statusLabels[order.status] }}
              </span>
            </td>
            <td class="px-6 py-4">
              <select (change)="updateStatus(order.id, +$any($event.target).value)"
                class="border border-gray-300 rounded-lg px-2 py-1 text-sm">
                <option value="0">Pendente</option>
                <option value="1">Confirmar</option>
                <option value="2">Enviar</option>
                <option value="3">Entregar</option>
                <option value="4">Cancelar</option>
              </select>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="5" class="px-6 py-8 text-center text-gray-500">Nenhum pedido encontrado.</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
