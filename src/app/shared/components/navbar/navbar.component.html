<nav class="bg-gray-900 text-white px-6 py-4 flex items-center justify-between">
  <a routerLink="/shop" class="text-xl font-bold text-white">🛒 ECommerce</a>

  <div class="flex items-center gap-6">
    <a routerLink="/shop" routerLinkActive="text-blue-400" class="hover:text-blue-400 transition">Produtos</a>

    @if (auth.isLoggedIn()) {
      @if (auth.isAdmin()) {
        <a routerLink="/admin/products" routerLinkActive="text-blue-400" class="hover:text-blue-400 transition">Produtos</a>
        <a routerLink="/admin/categories" routerLinkActive="text-blue-400" class="hover:text-blue-400 transition">Categorias</a>
        <a routerLink="/admin/orders" routerLinkActive="text-blue-400" class="hover:text-blue-400 transition">Pedidos</a>
        <a routerLink="/admin/users" routerLinkActive="text-blue-400" class="hover:text-blue-400 transition">Usuários</a>
      }
      <button (click)="auth.logout()" class="hover:text-red-400 transition">Sair</button>
    } @else {
      <a routerLink="/login" routerLinkActive="text-blue-400" class="hover:text-blue-400 transition">Login</a>
      <a routerLink="/register" routerLinkActive="text-blue-400" class="hover:text-blue-400 transition">Cadastro</a>
    }

    <a routerLink="/cart" class="relative hover:text-blue-400 transition">
      🛍️
      @if (cart.count() > 0) {
        <span class="absolute -top-2 -right-2 bg-blue-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">
          {{ cart.count() }}
        </span>
      }
    </a>
  </div>
</nav>
